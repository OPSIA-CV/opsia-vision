# Configuración de deploy para Netlify.
# La app es TanStack Start (Vite + Nitro): al detectar el entorno de Netlify,
# Nitro genera los assets estáticos en `dist` y la función SSR automáticamente.

[build]
  command = "bun run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# El video de demo vive en /assets con hash de contenido (cache-busting
# automático de Vite) — no necesita reglas de caché manuales.
